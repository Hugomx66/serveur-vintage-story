services:
  vintagestory:
    build:
      context: .
      args:
        VS_VERSION: "1.22.3"
    image: vintagestory-server:1.22.3
    container_name: vintagestory-server
    restart: unless-stopped
    stop_grace_period: 60s
    ports:
      - "7777:7777/udp"
    volumes:
      - .:/repo
    environment:
      GIT_TOKEN: "${GIT_TOKEN:-}"
      GIT_BRANCH: "${GIT_BRANCH:-main}"
      GIT_USER_NAME: "${GIT_USER_NAME:-VintageStoryServer}"
      GIT_USER_EMAIL: "${GIT_USER_EMAIL:-vintagestory@server.local}"
