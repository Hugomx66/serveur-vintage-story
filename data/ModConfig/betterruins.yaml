version: 12


##########
## Loot ##
##########


# Allows to change the loot additions and changes of betterruins. Set to 0 to completely disable them.
loot: 1
 # from 0 to 10 (default: 1) 

# Adjusts the spawn chance percentage for meteorite blocks in BetterRuins. Set to 100% for meteorite to appear in all eligible blocks, or lower the percentage to control its rarity. Setting it to 0% disables meteorite spawns entirely.
meteorvalue: 25
 # from 0 to 100 (default: 25) 


###########################
## Overall Spawn Chances ##
###########################


# Affects the spawn chance of all vanilla structures (not villages).
vanilla_structures_spawn_chance: 1
 # from 0 to 100 (default: 1) 

# Affects the spawn chance of all vanilla villages which are groups of smaller structures cluttered close to each other (not structures).
vanilla_villages_spawn_chance: 1
 # from 0 to 100 (default: 1) 

# Affects the spawn chance of all betterruins structures (not villages).
betterruins_structures_spawn_chance: 1
 # from 0 to 100 (default: 1) 

# Affects the spawn chance of all betterruins villages which are groups of smaller structures cluttered close to each other (not structures).
betterruins_villages_spawn_chance: 1
 # from 0 to 100 (default: 1) 


###########################
